<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panel Administrativo — Nelson Ruiz Pinilla</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1 class="login-logo">Nelson Ruiz Pinilla</h1>
        <p class="login-subtitle">Panel Administrativo</p>
      </div>

      <form id="loginForm" class="login-form">
        <div id="loginError" class="login-error"></div>

        <div class="form-group">
          <label for="loginEmail">Correo Electrónico</label>
          <input type="email" id="loginEmail" name="email" placeholder="su@correo.com" required autocomplete="email" />
        </div>

        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <input type="password" id="loginPassword" name="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <span class="btn-text">Iniciar Sesión</span>
          <span class="spinner"></span>
        </button>
      </form>

      <p class="login-notice">
        Acceso exclusivo para personal autorizado del despacho.
      </p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    window.ADMIN_CONFIG = {
      SUPABASE_URL: 'https://azraryuqcqibppexuiwi.supabase.co',
      SUPABASE_ANON_KEY: 'sb_publishable_bap-iRt1yLp0kGJjXv3d9Q_n6dz6BDz',
    };
  </script>
  <script src="../js/admin-auth.js"></script>
</body>
</html>
